buildscript {
    repositories {
        google()
        mavenCentral()
        jcenter()
    }
}
repositories {
    mavenCentral()
    maven {
        url "https://maven.google.com"
    }
}

cdvPluginPostBuildExtras.add({
    afterEvaluate {
        rootProject.subprojects {
            if (name == "app") {
                if (!plugins.hasPlugin('com.google.gms.google-services')) {
                    apply plugin: 'com.google.gms.google-services'
                }
            }
        }
    }
})
